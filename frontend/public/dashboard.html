<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YENDO</title>
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="yendo-logo">
  Y<span>ENDO</span>
</div>
    <nav>
      <button onclick="connectWallet()">
  Connect Phantom Wallet
</button>

      <button onclick="logout()">
  Logout
</button>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      <h3>SOL Balance</h3>
      <p id="balanceAmount">-- SOL</p>
      <p id="usdValue">$0.00</p>
    </div>
    <div class="card ai-card">

  <h2>YENDO AI</h2>

<p>
  Ask YENDO anything about your wallet,
  transactions, or Solana.
</p>

<textarea
  id="aiInput"
  placeholder="Ask YENDO anything..."
></textarea>

<button onclick="askYendoAI()">
  Ask YENDO
</button>

<div id="aiResponse"></div>
</div>

  <!-- Main Content -->
  <div class="main">

  <!-- Top Cards Row -->
  <div class="cards">

  </div>

  <!-- Bottom Section -->
  <div class="bottom">


  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
</body>
</html>
