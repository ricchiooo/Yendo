<!DOCTYPE html>
<html lang="en">
  <!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" href="/favicon.ico">
<link rel="manifest" href="/site.webmanifest">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YENDO</title>
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="yendo-logo">
      Y<span>ENDO</span>
    </div>
    <nav>
      <button onclick="connectWallet()">Connect Phantom Wallet</button>
      <button onclick="logout()">Logout</button>
    </nav>
  </header>

  <div class="container">
    <!-- SOL Balance Card - Reasonable Size -->
    <div class="card sol-balance-card">
      <h3>SOL Balance</h3>
      <p id="balanceAmount" class="portfolio-value">-- SOL</p>
      <p id="usdValue" class="usd-value">$0.00</p>
    </div>

    <!-- YENDO AI - Takes most of the space -->
    <div class="card ai-card">
      <h2>YENDO AI</h2>
      <p>Ask YENDO anything about your wallet, transactions, or Solana.</p>

      <textarea id="aiInput" placeholder="Ask YENDO anything..."></textarea>

      <button onclick="askYendoAI()">Ask YENDO</button>

      <div id="aiResponse"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
</body>
</html>
